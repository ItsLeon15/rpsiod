sites:
    -
        name: Example Website
        enabled: true
        serveAs: https

        match:
            domains:
                - localhost
                - 127.0.0.1
                - example.com
                - www.example.com

        listen:
            ip: 0.0.0.0
            ports:
                http: 80
                https: 443

        ssl:
            enabled: true
            mode: auto
            provider: local
            email: admin@example.com
            storage: /var/lib/rpsiod/ssl/localhost
            challenge: http
            renewBefore: 30d

        redirects:
            httpToHttps: false
            www:
                enabled: false
                mode: apexToWww
                status: 301

        routing:
            type: static

        static:
            root: /absolute/path/to/rpsiod/examples/www/example.com
            index:
#                - index.php
                - index.html
                - index.htm
            fallback: # fallback.html
            directoryListing: false

        php:
            enabled: false
            mode: fpm

            security:
                allowPathInfo: false
                blockDirectAccess:
                    - .env
                    - composer.json
                    - composer.lock
                    - .git
                    - .gitignore
                    - .htaccess
                    - vendor
                    - storage

        maintenance:
            enabled: false
            status: 503
            page: /var/www/rpsiod-errors/maintenance.html

        errors:
            pages:
                404: /var/www/rpsiod-errors/404.html
                500: /var/www/rpsiod-errors/500.html
                503: /var/www/rpsiod-errors/maintenance.html

        security:
            maxBodySize: 25mb
            hideServerHeader: true
            allowSymlinks: false

            allowedMethods:
                - GET
                - HEAD

        limits:
            rateLimit:
                enabled: false
                requests: 100
                window: 1m

        compression:
            enabled: true

            algorithms:
                - gzip

            minimumSize: 1kb

        cache:
            enabled: false
            default: public, max-age=3600

        headers:
            add:
                X-Frame-Options: SAMEORIGIN
                X-Content-Type-Options: nosniff

            remove:

        logging:
            access:
                enabled: true
                path: /var/log/rpsiod/example-access.log

            error:
                enabled: true
                path: /var/log/rpsiod/example-error.log
