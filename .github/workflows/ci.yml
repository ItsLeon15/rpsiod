name: ci

on:
  push:
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cppcheck \
            curl \
            libnghttp2-dev \
            libssl-dev \
            netcat-openbsd \
            python3

      - name: Build
        run: make

      - name: Prepare CI config paths
        run: |
          REPO_DIR="$(pwd)"
          
          sed \
            -e "s|root: examples/www/example.com|root: ${REPO_DIR}/examples/www/example.com|g" \
            -e "s|root: /absolute/path/to/rpsiod/examples/www/example.com|root: ${REPO_DIR}/examples/www/example.com|g" \
            -e "s|/root/rpsiod/examples/www/errors|${REPO_DIR}/examples/www/errors|g" \
            -e "s|/absolute/path/to/rpsiod/examples/www/errors|${REPO_DIR}/examples/www/errors|g" \
            examples/sites.yml > examples/sites.ci.yml

      - name: Config check
        run: ./build/rpsiod config-check --server examples/server.yml --sites examples/sites.ci.yml

      - name: Warning build
        run: |
          make clean
          CFLAGS="-O2 -g -Wall -Wextra -Wpedantic -Wconversion -Wshadow -Wformat=2 -Werror=format-security" make

      - name: Cppcheck
        run: |
          cppcheck \
          --enable=warning,performance,portability \
          --inconclusive \
          --check-level=exhaustive \
          src 2> cppcheck.txt || true

      - name: Check cppcheck results
        run: |
          cat cppcheck.txt
          
          ! grep -Eiq \
            "error:|buffer|overflow|leak|uninit|nullPointer|memleak|invalid" \
            cppcheck.txt

      - name: ASAN/UBSAN build
        run: |
          make clean
          CFLAGS="-O1 -g -fsanitize=address,undefined -fno-omit-frame-pointer -Wall -Wextra -Wformat=2 -Werror=format-security" \
          LDFLAGS="-fsanitize=address,undefined" \
          make

      - name: Prepare non-root runtime directories
        run: |
          sudo install -d -m 0777 /run/rpsiod /var/log/rpsiod /var/cache/rpsiod /var/lib/rpsiod/ssl

      - name: Non-root regression tests
        run: bash test.sh

      - name: Clean generated output
        run: make clean
