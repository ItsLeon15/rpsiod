name: ci

on:
  push:
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cppcheck \
            curl \
            libnghttp2-dev \
            libssl-dev \
            netcat-openbsd \
            python3

      - name: Build
        run: make

      - name: Prepare CI config paths
        run: |
          REPO_DIR="$(pwd)"

          python3 - <<'PY'
            from pathlib import Path

            repo = Path.cwd()
            sites = repo / "examples" / "sites.yml"

            text = sites.read_text()
            text = text.replace(
                "root: examples/www/example.com",
                f"root: {repo}/examples/www/example.com"
            )
            text = text.replace(
                "page: /root/rpsiod/examples/www/errors/maintenance.html",
                f"page: {repo}/examples/www/errors/maintenance.html"
            )
            text = text.replace(
                "404: /root/rpsiod/examples/www/errors/404.html",
                f"404: {repo}/examples/www/errors/404.html"
            )
            text = text.replace(
                "500: /root/rpsiod/examples/www/errors/500.html",
                f"500: {repo}/examples/www/errors/500.html"
            )
            text = text.replace(
                "503: /root/rpsiod/examples/www/errors/maintenance.html",
                f"503: {repo}/examples/www/errors/maintenance.html"
            )

            ci_sites = repo / "examples" / "sites.ci.yml"
            ci_sites.write_text(text)
          PY

      - name: Config check
        run: ./build/rpsiod config-check --server examples/server.yml --sites examples/sites.ci.yml

      - name: Warning build
        run: |
          make clean
          CFLAGS="-O2 -g -Wall -Wextra -Wpedantic -Wconversion -Wshadow -Wformat=2 -Werror=format-security" make

      - name: Cppcheck
        run: cppcheck --enable=all --inconclusive --check-level=exhaustive src 2> cppcheck.txt || true

      - name: Check cppcheck results
        run: |
          cat cppcheck.txt
          ! grep -Eiq "error:|warning:|knownConditionTrueFalse|duplicateCondition|incompleteArrayFill|buffer|overflow|leak|uninit|nullPointer|memleak|invalid" cppcheck.txt

      - name: ASAN/UBSAN build
        run: |
          make clean
          CFLAGS="-O1 -g -fsanitize=address,undefined -fno-omit-frame-pointer -Wall -Wextra -Wformat=2 -Werror=format-security" \
          LDFLAGS="-fsanitize=address,undefined" \
          make

      - name: Prepare non-root runtime directories
        run: |
          sudo install -d -m 0777 /run/rpsiod /var/log/rpsiod /var/cache/rpsiod /var/lib/rpsiod/ssl

      - name: Non-root regression tests
        run: bash test.sh

      - name: Clean generated output
        run: make clean
